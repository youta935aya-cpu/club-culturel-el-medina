    <main>
      <h2>Inscription à l'événement</h2>

      <form id="register-form" class="form-container">
        <div class="form-group">
          <label for="nom">Nom complet :</label>
          <input type="text" id="nom" name="nom" required />
        </div>

        <div class="form-group">
          <label for="email">Email :</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="user@club.tn"
            required
          />
        </div>

        <div class="form-group">
          <label for="telephone">Téléphone :</label>
          <input
            type="tel"
            id="telephone"
            name="telephone"
            placeholder="00 00 00 00"
            pattern="[0-9]{8}"
            title="Le numéro de téléphone doit contenir exactement 8 chiffres"
            required
          />
        </div>

        <div class="form-group">
          <label for="places">Nombre de places :</label>
          <input
            type="number"
            id="places"
            name="places"
            min="1"
            max="10"
            required
          />
        </div>

        <div class="form-group">
          <label for="message">Remarques :</label>
          <textarea id="message" name="message" rows="4"></textarea>
        </div>

        <div id="success-message" style="display: none;"></div>
        <div id="error-message" style="display: none;"></div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">S'inscrire</button>
          <a href="home.html" class="btn btn-secondary">Retour</a>
        </div>
      </form>
